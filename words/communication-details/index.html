          <h1>沟通里的细节</h1>
          <p class="note-lead">
            沟通常常不是一句话的输赢，而是信息、情绪、边界和下一步有没有被放在合适的位置。
          </p>

          <section>
            <h2>观察维度</h2>
            <ul>
              <li>信息有没有说完整。</li>
              <li>语气有没有遮住真正的意思。</li>
              <li>对方下一步要做什么是否清楚。</li>
              <li>自己的边界有没有被表达出来。</li>
            </ul>
          </section>

          <section>
            <h2>复盘模板</h2>
            <pre><code>场景：
我当时怎么说：
对方怎么理解：
哪里可以更清楚：
下次可以这样说：</code></pre>
