          <h1>短文练习</h1>
          <p class="note-lead">
            短文不需要宏大，只练一个意思能不能说清楚：开头是否稳，转折是否自然，结尾是否落地。
          </p>

          <section>
            <h2>练习目标</h2>
            <ul>
              <li>一篇只写一个核心判断。</li>
              <li>控制篇幅，减少绕路。</li>
              <li>把抽象感受落到具体场景里。</li>
            </ul>
          </section>

          <section>
            <h2>写作模板</h2>
            <pre><code>我想写的是：
这件事为什么值得写：
一个具体场景：
最后想留下的判断：</code></pre>
